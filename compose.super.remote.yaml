services:
  app:
    build: .
    image: local-dockerlempapp:latest
    ports:
      - "8080:80"
      - "8443:8443"
    volumes:
      - ./app:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock
      - ./tenants:/tenants
      - ./compose.tenant.yaml:/home/ubuntu/Workspace/compose.tenant.yaml:ro
      #- ./conf/docker.remote.json:/etc/docker/daemon.json:ro
    environment:
      DOCKER_HOST: tcp://host.docker.internal:2375
      DOCKER_CONFIG: /tmp/.docker
      TZ: Australia/Sydney
      DB_VENDOR: mysql
      DB_HOST: db
      HOST_PROJECT_ROOT: ${HOST_PROJECT_ROOT}
      TENANT_APP_IMAGE: ${TENANT_APP_IMAGE:-local-dockerlempapp:latest}
      TENANT_DB_IMAGE: ${TENANT_DB_IMAGE:-local-dockerlempdb:latest}
      TENANT_APP_VOLUME: ${TENANT_APP_VOLUME:-}
    networks:
      - stack-network
      - superhost-network
    deploy:
      resources:
        limits:
          memory: 256M
  db:
    build:
      context: .
      dockerfile: ./Dockerfile.db
    image: local-dockerlempdb:latest
    environment:
      MYSQL_ROOT_PASSWORD: docker_lemp
      MYSQL_DATABASE: stackDB
      MYSQL_USER: docker_user_lemp
      MYSQL_PASSWORD: docker_user_lemp
      TZ: Australia/Sydney
    volumes:
      - db_data:/var/lib/mysql
      - ./conf/common/01_db_ddl.sql:/docker-entrypoint-initdb.d/01_db_ddl.sql
      - ./conf/common/02_db_dml.sql:/docker-entrypoint-initdb.d/02_db_dml.sql
      - ./conf/${TARGET_ENV}/03_db_dml.sql:/docker-entrypoint-initdb.d/03_db_dml.sql:ro
    ports:
      - "3306:3306"
    networks:
      - stack-network
    deploy:
      resources:
        limits:
          memory: 512M
volumes:
  db_data:
networks:
  stack-network:
    driver: bridge
  superhost-network:
    external: true
    name: superhost-network