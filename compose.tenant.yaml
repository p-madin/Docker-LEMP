services:
  app:
    #build: 
    #  context: .
    #  dockerfile: /home/ubuntu/Workspace/Dockerfile
    image: ${TENANT_APP_IMAGE}
    expose:
      - "443"
    environment:
      DB_HOST: db
      DB_VENDOR: ${DB_VENDOR}
      TENANT_DB_NAME: ${TENANT_DB_NAME}
      TENANT_DB_USER: ${TENANT_DB_USER}
      TENANT_DB_PASS: ${TENANT_DB_PASS}
      TENANT_NAME: ${TENANT_NAME}
#TENANT_APP_VOLUME_PLACEHOLDER#
    networks:
      - tenant-network
      - superhost-network
    deploy:
      resources:
        limits:
          memory: 256M
  db:
    #build:
    #  context: .
    #  dockerfile: /home/ubuntu/Workspace/Dockerfile.db
    image: ${TENANT_DB_IMAGE}
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${TENANT_DB_ROOT}
      MYSQL_DATABASE: ${TENANT_DB_NAME}
      MYSQL_USER: ${TENANT_DB_USER}
      MYSQL_PASSWORD: ${TENANT_DB_PASS}
    networks:
      - tenant-network
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  tenant-network:
  superhost-network:
    external: true