<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
    <defs>
        <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ff55" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#00aa33" stop-opacity="1"/>
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
        </filter>
    </defs>
    
    <!-- Background Circle -->
    <circle cx="60" cy="60" r="55" fill="#1a1a1a" filter="url(#shadow)"/>
    
    <!-- Server Stack Base (L, E, M, P) -->
    <g transform="translate(25, 30)">
        <!-- Layer 1 -->
        <rect x="0" y="0" width="70" height="12" rx="3" fill="#333333"/>
        <circle cx="10" cy="6" r="3" fill="url(#neonGlow)"/>
        <line x1="20" y1="6" x2="60" y2="6" stroke="#555555" stroke-width="2" stroke-linecap="round"/>
        
        <!-- Layer 2 -->
        <rect x="0" y="18" width="70" height="12" rx="3" fill="#333333"/>
        <circle cx="10" cy="24" r="3" fill="url(#neonGlow)"/>
        <line x1="20" y1="24" x2="60" y2="24" stroke="#555555" stroke-width="2" stroke-linecap="round"/>
        
        <!-- Layer 3 -->
        <rect x="0" y="36" width="70" height="12" rx="3" fill="#333333"/>
        <circle cx="10" cy="42" r="3" fill="url(#neonGlow)"/>
        <line x1="20" y1="42" x2="60" y2="42" stroke="#555555" stroke-width="2" stroke-linecap="round"/>
        
        <!-- Layer 4 -->
        <rect x="0" y="54" width="70" height="12" rx="3" fill="#333333"/>
        <circle cx="10" cy="60" r="3" fill="url(#neonGlow)"/>
        <line x1="20" y1="60" x2="60" y2="60" stroke="#555555" stroke-width="2" stroke-linecap="round"/>
    </g>
</svg>
