<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1000 1000">
    <style>
        @keyframes blink {
            0%, 100% {
                opacity: 1; /* 50% of the time: fully visible */
            }
            50% {
                opacity: 0; /* 50% of the time: completely hidden */
            }
        }
        .animated-cursor {
            fill: #FF0000;
            transform-origin: center;
            animation: blink 1s steps(1, start) infinite;
        }
    </style>
    <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="2" stdDeviation="3"
                          flood-color="#000000"
                          flood-opacity="0.3"/>
        </filter>
        <mask id="fx-slice">
            <rect x="0" y="0" width="1000" height="1000" fill="white" />
            <rect x="400" y="460" width="600" height="15" fill="black" />
            <rect x="400" y="520" width="600" height="7" fill="black" />
            <rect x="400" y="580" width="600" height="3" fill="black" />
        </mask>
    </defs>

    <g filter="url(#shadow)">

        <!-- Circle -->
        <circle cx="500"
                cy="500"
                r="430"
                fill="white"
                stroke="#1F2937"
                stroke-width="36"/>

            <path fill="#C5A253"
            d="
                M285 210

                C285 210 355 190 440 210
                C520 230 570 285 570 340

                C570 410 520 465 440 485
                C355 505 285 470 285 470
                M285 500
                M285 430
                

                C325 430 365 430 415 430
                C460 420 490 385 490 340
                C490 295 460 260 415 250
                C365 245 325 250 285 270

                Z
            "/>


            <!-- Classical Serif R Tail -->
            <path fill="#C5A253"
            d="
                M 365 478
                C 400 580, 460 760, 560 790
                L 635 790
                C 535 760, 465 580, 430 484
                Z
            "/>
        <!-- Serif R (more classical serif styling) -->
        <path class='animated-cursor' 
            d="
                M285 210
                L330 210
                L330 790
                L285 790
                Z
            "/>
        <g mask="url(#fx-slice)">
            <!-- Thick F -->
            <path fill="#1F2937"
                  d="
                    M420 420
                    L610 420
                    L610 500
                    L500 500
                    L500 550
                    L570 550
                    L570 630
                    L500 630
                    L500 700
                    L420 700
                    Z
                  "/>

            <!-- Thick X -->
            <path fill="#1F2937"
                  d="
                    M615 455
                    L715 455
                    L790 530
                    L865 455
                    L965 455

                    L840 580
                    L965 705
                    L865 705
                    L790 630
                    L715 705
                    L615 705

                    L740 580
                    Z
                  "/>
        </g>

    </g>

</svg>